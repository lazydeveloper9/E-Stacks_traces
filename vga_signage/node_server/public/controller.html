<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Controller</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f9; padding: 20px; color: #333; max-width: 600px; margin: 0 auto;}
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { margin-top: 0; color: #2c3e50; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .toggle { display: flex; align-items: center; gap: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; background: #3498db; color: white; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #2980b9; }
        .btn-play { background: #2ecc71; }
        .btn-play:hover { background: #27ae60; }
        .btn-layout { background: #9b59b6; }
        .btn-layout:hover { background: #8e44ad; }
        .media-list { list-style: none; padding: 0; }
        .media-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; word-break: break-all; gap: 10px;}
        .media-item:last-child { border-bottom: none; }
        .badge { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge.auto { background: #2ecc71; }
        .badge.layout { background: #f39c12; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Control Panel 
            <span id="mode-badge" class="badge">Loading</span>
            <span id="layout-badge" class="badge layout">Layout</span>
        </h1>
        
        <div class="control-group">
            <label>Hardware Layout</label>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-layout" onclick="setLayout('duplicate')">1x1 Duplicate</button>
                <button class="btn btn-layout" onclick="setLayout('2x2')">2x2 Video Wall</button>
            </div>
            <small style="color:#7f8c8d; display:block; margin-top:5px;">Changes the backend streaming logic instantly.</small>
        </div>

        <div class="control-group">
            <label>Mode</label>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="setMode('auto')">Auto Playlist Loop</button>
            </div>
        </div>

        <div class="control-group">
            <label>Slide Duration (seconds)</label>
            <input type="number" id="duration" onchange="updateSettings()" min="1" max="300">
        </div>

        <div class="control-group toggle">
            <input type="checkbox" id="pdf-scroll" onchange="updateSettings()">
            <label style="margin:0;" for="pdf-scroll">Auto-Scroll PDFs</label>
        </div>
    </div>

    <div class="card">
        <h2>Media Playlist</h2>
        <button class="btn" onclick="loadPlaylist()" style="margin-bottom: 10px;">Refresh List</button>
        <ul class="media-list" id="playlist">
            <!-- Injected via JS -->
        </ul>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/controller.js"></script>
</body>
</html>
