<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=640, height=480, initial-scale=1.0">
    <title>Digital Signage Engine</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            width: 640px; height: 480px;
        }
        .container {
            width: 100%; height: 100%; position: relative;
        }
        .media {
            width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.5s ease-in-out;
        }
        .media.active {
            opacity: 1;
        }
        /* New class for PDF scrolling */
        canvas.media.scrollable {
            height: auto !important;
            object-fit: cover; /* Force to fill width */
            top: 0;
        }
        canvas.media {
            width: 100% !important;
            height: 100% !important;
        }
        .notice {
            color: white; text-align: center; width: 100%; position: absolute;
            top: 200px; font-size: 32px; font-family: Arial, sans-serif;
        }
    </style>
    <!-- Include PDF.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
</head>
<body>
    <div class="container" id="media-container">
        <!-- Media elements will be injected here -->
    </div>
    
    <!-- Socket.io Client -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>
</html>
